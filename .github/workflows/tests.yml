name: Python tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Pytest (unit tests)
        run: |
          python -m pip install --upgrade uv
          uv venv
          uv pip install -e ".[test]"
          uv run pytest --ignore=tests/test_browser

  session-check:
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python3.11-bookworm
    steps:
      - uses: actions/checkout@v4
      - name: Export marimo sessions and check for staleness
        run: |
          UV_SYSTEM_PYTHON=1 uv pip install -e ".[docs]"
          UV_SYSTEM_PYTHON=1 make marimo-sessions
          git diff --exit-code demos/__marimo__ examples/__marimo__ || {
            echo "::error::Session files are stale. Run 'make marimo-sessions' and commit the results."
            exit 1
          }

  browser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade uv
          uv venv
          uv pip install -e ".[test-browser]"
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(uv run python -c 'import playwright; print(playwright.__version__)')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}-chromium
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium --with-deps
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: uv run playwright install-deps chromium
      - name: Pytest (browser tests)
        run: uv run pytest tests/test_browser -v
